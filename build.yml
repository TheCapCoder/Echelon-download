name: Build Echelon OS
on: [push]
jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install
      - run: npm run build-mac
      - uses: actions/upload-artifact@v3
        with:
          name: EchelonOS-Mac
          path: dist/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install
      - run: npm run build-win
      - uses: actions/upload-artifact@v3
        with:
          name: EchelonOS-Windows
          path: dist/*.exe